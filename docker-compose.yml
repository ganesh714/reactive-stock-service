version: '3.8'

services:
  app:
    # Build the image from the Dockerfile in the current directory
    build: .
    # Name of the container
    container_name: reactive-stock-service
    # Map port 8080 on the host to port 8080 in the container
    ports:
      - "8080:8080"
    # Link to the .env file for environment variables
    env_file:
      - .env
    # Health check to ensure the application is ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"] 
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s